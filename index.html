<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TrailTrip Demo V7</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 설정 먼저 로드 -->
  <script src="config.js"></script>

  <!-- 카카오맵 SDK를 config.js의 키로 동적 로드 -->
  <script>
    (function loadKakaoMapSdk() {
      const config = window.TRAILTRIP_CONFIG || {};
      const kakaoKey = config.kakaoJavascriptKey;

      if (!kakaoKey) {
        console.error('카카오 JavaScript 키가 비어 있습니다. config.js를 확인하세요.');
        return;
      }

      const existing = document.querySelector('script[data-kakao-sdk="true"]');
      if (existing) return;

      const script = document.createElement('script');
      script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoKey}&autoload=false`;
      script.async = true;
      script.dataset.kakaoSdk = 'true';

      script.onload = function () {
        console.log('Kakao Maps SDK loaded');
      };

      script.onerror = function () {
        console.error('Kakao Maps SDK 로드 실패');
      };

      document.head.appendChild(script);
    })();
  </script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand">TRAILTRIP DEMO V7</div>
        <h1 class="title">하귀 → 협재</h1>
        <p class="subtitle">카카오맵 기반 현장 답사 데모</p>
      </div>

      <div class="status-wrap">
        <div class="status-pill" id="gpsStatus">대기 중</div>
        <div class="status-sub" id="saveStatus">로컬 자동저장</div>
      </div>
    </header>

    <main class="main-content">
      <section class="map-card">
        <div class="map-card-head">
          <div>
            <h2 class="section-title">현장 지도</h2>
            <p class="section-sub">약 15.0 km</p>
          </div>
          <button id="resetRouteBtn" class="chip-btn" type="button">기본 데모 경로</button>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <span class="stat-label">거리</span>
            <strong class="stat-value" id="distanceValue">0.00 km</strong>
          </div>
          <div class="stat-box">
            <span class="stat-label">시간</span>
            <strong class="stat-value" id="timeValue">00:00:00</strong>
          </div>
          <div class="stat-box">
            <span class="stat-label">속도</span>
            <strong class="stat-value" id="speedValue">0.0 km/h</strong>
          </div>
          <div class="stat-box">
            <span class="stat-label">진행률</span>
            <strong class="stat-value" id="progressValue">0%</strong>
          </div>
        </div>

        <div class="map-wrap">
          <div id="map" class="map"></div>

          <div class="map-floating-controls">
            <button id="locateBtn" class="fab-btn" type="button" title="현재 위치로 이동">◎</button>
            <button id="zoomInBtn" class="fab-btn" type="button" title="확대">+</button>
            <button id="zoomOutBtn" class="fab-btn" type="button" title="축소">−</button>
          </div>
        </div>

        <div class="primary-actions">
          <button id="startBtn" class="primary-btn" type="button">로그 시작</button>
          <button id="recordTabBtn" class="secondary-btn" type="button">기록</button>
          <button id="pointTabBtn" class="secondary-btn" type="button">포인트</button>
        </div>

        <div class="secondary-actions">
          <button id="syncBtn" class="ghost-btn" type="button">서버 동기화</button>
          <button id="gpxBtn" class="ghost-btn" type="button">내 로그 GPX</button>
          <button id="jsonBtn" class="ghost-btn" type="button">JSON 저장</button>
        </div>

        <div class="tertiary-actions">
          <button id="newSessionBtn" class="ghost-btn wide" type="button">새 기록</button>
          <button id="restoreDemoBtn" class="ghost-btn wide" type="button">기본 경로 복원</button>
        </div>
      </section>

      <section id="recordPanel" class="sheet hidden">
        <div class="sheet-head">
          <h3>기록</h3>
          <button id="closeRecordPanelBtn" class="text-btn" type="button">닫기</button>
        </div>

        <div class="form-group">
          <label for="pointType">유형</label>
          <select id="pointType">
            <option value="scenery">자연경관</option>
            <option value="restaurant">식당</option>
            <option value="cafe">카페</option>
            <option value="store">편의점</option>
            <option value="toilet">화장실</option>
            <option value="traffic">주차/교통</option>
            <option value="etc">기타</option>
          </select>
        </div>

        <div class="form-group">
          <label for="pointTitle">이름</label>
          <input id="pointTitle" type="text" placeholder="예: 곽지 해변 포토스팟" />
        </div>

        <div class="form-group">
          <label for="pointMemo">메모</label>
          <textarea id="pointMemo" rows="4" placeholder="느낌, 편의시설 정보, 유의점 등을 적어보세요"></textarea>
        </div>

        <div class="form-group">
          <label for="photoInput">사진</label>
          <input id="photoInput" type="file" accept="image/*" capture="environment" />
        </div>

        <div class="record-actions">
          <button id="fillCurrentLocationBtn" class="secondary-btn" type="button">현재 위치 넣기</button>
          <button id="savePointBtn" class="primary-btn" type="button">포인트 저장</button>
        </div>
      </section>

      <section id="pointPanel" class="sheet hidden">
        <div class="sheet-head">
          <h3>포인트</h3>
          <button id="closePointPanelBtn" class="text-btn" type="button">닫기</button>
        </div>

        <div id="pointList" class="point-list">
          <div class="empty-text">아직 저장된 포인트가 없습니다.</div>
        </div>
      </section>
    </main>

    <nav class="bottom-tab">
      <button id="tabMapBtn" class="tab-btn active" type="button">🗺️<span>지도</span></button>
      <button id="tabRecordBtn" class="tab-btn" type="button">📝<span>기록</span></button>
      <button id="tabPointBtn" class="tab-btn" type="button">📍<span>포인트</span></button>
    </nav>
  </div>

  <!-- app.js는 가장 마지막 -->
  <script src="route-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
